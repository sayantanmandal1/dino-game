user  nginx;
worker_processes  auto;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript application/octet-stream image/svg+xml;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen       3000;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Serve static files with long cache for hashed assets
    location /static/ {
      expires 7d;
      add_header Cache-Control "public, immutable";
    }

    # API proxy
    location /api/ {
      proxy_pass         http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location = /health   { proxy_pass http://backend:8000/health; }
    location = /ready    { proxy_pass http://backend:8000/ready; }

    # SPA fallback
    location / {
      try_files $uri /index.html;
    }
  }
}
